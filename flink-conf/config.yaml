# flink-conf/config.yaml
# Flink 2.x 使用严格标准 YAML 格式
# 旧式扁平格式（flink-conf.yaml）已在 Flink 2.0 废弃

jobmanager:
  rpc:
    address: flink-jobmanager    # 必须与 docker-compose.yml 中的服务名一致
  memory:
    process:
      size: 1600m                # JobManager 进程总内存（含 JVM overhead）

taskmanager:
  memory:
    process:
      size: 1728m                # TaskManager 进程总内存
                                 # 内存不足（2G VPS）时可调低到 1024m

sql-gateway:
  endpoint:
    rest:
      address: 0.0.0.0           # 容器内监听所有接口，允许 Docker 网络访问
      port: 8083
